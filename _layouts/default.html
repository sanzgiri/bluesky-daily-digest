<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}" />
  <link rel="canonical" href="{{ page.url | absolute_url }}" />
  {% seo title=false %}
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%93%B0%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="{{ '/' | relative_url }}" class="site-title">
        <span class="logo">📰</span>
        <span>{{ site.title }}</span>
      </a>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}">Archive</a>
        <a href="{{ '/about/' | relative_url }}">About</a>
        <a href="{{ '/feed.xml' | relative_url }}" title="RSS feed">RSS</a>
        <a href="https://github.com/sanzgiri/bluesky-daily-digest-v2" title="Source code">GitHub</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    <div class="container">
      {{ content }}
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        AI-curated by <strong>Claude Haiku</strong> from
        <span class="source-pill bluesky">🦋 Bluesky</span>
        <span class="source-pill mastodon">🐘 Mastodon</span>
        <span class="source-pill hn">🟠 HN</span>
        <span class="source-pill reddit">👽 Reddit</span>
        <span class="source-pill rss">📰 Blogs</span>
      </p>
      <p class="muted">
        Generated daily · <a href="{{ '/feed.xml' | relative_url }}">Subscribe via RSS</a> · <a href="https://github.com/sanzgiri/bluesky-daily-digest-v2">Source on GitHub</a>
      </p>
    </div>
  </footer>
</body>
</html>
